<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B.Like Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚗️</text></svg>">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-brand">
      <span class="header-name" id="char-name">Власа Смоленская</span>
      <span class="header-sub">B.Like · <span id="header-day">День —</span></span>
    </div>
    <div class="header-controls">
      <button class="btn-lang" id="btn-lang" onclick="toggleLang()" title="Перевод">EN</button>

    </div>
    <div class="header-date" id="header-date"><strong>—</strong></div>
  </header>

  <!-- HERO BANNER -->
  <div class="hero-banner" id="hero-banner">
    <img src="images/vlasa_hero.jpg" alt="Власа" class="hero-img" id="hero-img">
    <div class="hero-overlay">
      <span class="hero-tagline" id="hero-tagline">B.Like Active Lab</span>
    </div>
  </div>

  <!-- MAIN -->
  <main id="main-content"></main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-btn active" data-char="vlasa-lab" onclick="switchChar('vlasa-lab')">
      <span class="nav-icon">🧪</span>
      <span class="nav-label">Влаcа</span>
    </button>
    <button class="nav-btn" data-char="vlasa-hair" onclick="switchChar('vlasa-hair')">
      <span class="nav-icon">✂️</span>
      <span class="nav-label">Парикмахер</span>
    </button>
    <button class="nav-btn" data-char="cats" onclick="switchChar('cats')">
      <span class="nav-icon">🐱</span>
      <span class="nav-label">Коты</span>
    </button>
    <button class="nav-btn" data-char="products" onclick="switchChar('products')">
      <span class="nav-icon">🛍</span>
      <span class="nav-label">Продукты</span>
    </button>
    <button class="nav-btn" data-char="alexander" onclick="switchChar('alexander')">
      <span class="nav-icon">👑</span>
      <span class="nav-label">Александр</span>
    </button>
  </nav>

      <div class="modal-body">
        <a class="btn btn-primary" href="https://www.tiktok.com/creator#/analytics" target="_blank" rel="noopener" style="display:flex;margin-bottom:14px">
          Открыть TikTok Creator Center ↗
        </a>
        <div style="margin-bottom:10px;font-size:13px;color:var(--text-dim)">Внеси количество токенов вручную:</div>
        <div style="display:flex;gap:8px">
          <input id="token-input" type="number" placeholder="напр. 1240" class="token-input" min="0">
          <button class="btn btn-copy" onclick="saveToken()" style="flex-shrink:0;width:80px">Сохранить</button>
        </div>
        <div id="token-history" style="margin-top:14px"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

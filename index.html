<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B.Like Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚗️</text></svg>">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-brand">
      <span class="header-name" id="char-name">Власа Смоленская</span>
      <span class="header-sub">B.Like · <span id="header-day">День —</span></span>
    </div>
    <div class="header-controls">
      <button class="btn-refresh-page" onclick="location.reload()" title="Обновить страницу">↻</button>
      <button class="btn-lang" id="btn-lang" onclick="toggleLang()" title="Language">РУ</button>
    </div>
    <div class="header-date" id="header-date"><strong>—</strong></div>
  </header>

  <!-- HERO BANNER -->
  <div class="hero-banner" id="hero-banner">
    <img src="images/vlasa_hero.png" alt="Власа" class="hero-img" id="hero-img">
  </div>

  <!-- MAIN -->
  <main id="main-content"></main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-btn active" data-char="vlasa-lab" onclick="switchChar('vlasa-lab')">
      <span class="nav-icon">🧪</span>
      <span class="nav-label">Влаcа</span>
    </button>
    <button class="nav-btn" data-char="vlasa-hair" onclick="switchChar('vlasa-hair')">
      <span class="nav-icon">✂️</span>
      <span class="nav-label">Парикмахер</span>
    </button>
    <button class="nav-btn" data-char="cats" onclick="switchChar('cats')">
      <span class="nav-icon">🐱</span>
      <span class="nav-label">Коты</span>
    </button>
    <button class="nav-btn" data-char="products" onclick="switchChar('products')">
      <span class="nav-icon">🛍</span>
      <span class="nav-label">Продукты</span>
    </button>
    <button class="nav-btn" data-char="alexander" onclick="switchChar('alexander')">
      <span class="nav-icon">⚡</span>
      <span class="nav-label">Александр</span>
    </button>
  </nav>
  <script src="app.js"></script>
</body>
</html>
